<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>물리학 시뮬레이터 · Physics Lab</title>
<style>
  :root {
    --bg: #0a0e17;
    --bg-canvas: #070b13;
    --panel: #111726;
    --panel-2: #18202f;
    --panel-3: #1e2839;
    --border: #232f43;
    --border-light: #2f3d54;
    --text: #e6edf5;
    --text-dim: #8a98ad;
    --text-faint: #57647d;
    --accent: #45c7e0;
    --accent-dim: #2a7a8a;
    --accent-soft: rgba(69, 199, 224, 0.12);
    --good: #4ade80;
    --good-soft: rgba(74, 222, 128, 0.12);
    --warn: #fbbf24;
    --danger: #f87171;
    --danger-soft: rgba(248, 113, 113, 0.12);
    --mono: 'SF Mono', 'JetBrains Mono', 'Roboto Mono', ui-monospace, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* ---------- Top bar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    padding: 0 1.25rem;
    height: 56px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 20;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    flex-shrink: 0;
  }
  .brand .logo {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .brand .logo .dot { color: var(--accent); }
  .brand .sub {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--mono);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .tabs {
    display: flex;
    gap: 2px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 13px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .tab:hover { background: var(--panel-2); color: var(--text); }
  .tab.active {
    background: var(--accent-soft);
    border-color: var(--accent-dim);
    color: var(--accent);
  }
  .tab .ico { width: 16px; height: 16px; display: block; }

  .panel-toggle {
    display: none;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    flex-shrink: 0;
  }
  .panel-toggle svg { width: 18px; height: 18px; }

  /* ---------- Stage ---------- */
  .stage {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .canvas-wrap {
    flex: 1;
    position: relative;
    background: var(--bg-canvas);
    overflow: hidden;
  }

  canvas#stage-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }

  .overlay-hint {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 16px;
    background: rgba(17, 23, 38, 0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12.5px;
    color: var(--text-dim);
    pointer-events: none;
    white-space: nowrap;
    max-width: 90%;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: opacity 0.3s;
    z-index: 5;
  }
  .overlay-hint b { color: var(--accent); font-weight: 600; }

  .statusbar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 9px 18px;
    background: rgba(10, 14, 23, 0.9);
    backdrop-filter: blur(8px);
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--text-faint);
    overflow-x: auto;
    scrollbar-width: none;
    z-index: 5;
  }
  .statusbar::-webkit-scrollbar { display: none; }
  .statusbar .stat { display: flex; gap: 6px; white-space: nowrap; }
  .statusbar .stat .k { color: var(--text-faint); }
  .statusbar .stat .v { color: var(--text); }
  .statusbar .run-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-faint);
    flex-shrink: 0;
  }
  .statusbar .run-dot.running { background: var(--good); box-shadow: 0 0 8px var(--good); }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 340px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-head h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .sidebar-head .close {
    display: none;
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; padding: 4px;
  }
  .sidebar-head .close svg { width: 18px; height: 18px; }

  .sidebar-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px 32px;
    scrollbar-width: thin;
    scrollbar-color: var(--border-light) transparent;
  }
  .sidebar-body::-webkit-scrollbar { width: 8px; }
  .sidebar-body::-webkit-scrollbar-thumb {
    background: var(--border-light); border-radius: 4px;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ---------- Control components ---------- */
  .group { margin-bottom: 22px; }
  .group:last-child { margin-bottom: 0; }

  .group-label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-faint);
    margin-bottom: 12px;
  }
  .group-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }

  .field-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 7px;
  }
  .field-row label {
    font-size: 12.5px;
    color: var(--text-dim);
  }
  .field-row .val {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 2px 8px;
    border-radius: 5px;
    min-width: 44px;
    text-align: center;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: var(--panel-3);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
    cursor: pointer;
    box-shadow: 0 0 0 1px var(--accent-dim);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
    cursor: pointer;
  }

  input[type="number"] {
    width: 100%;
    padding: 9px 11px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="number"]:focus { border-color: var(--accent-dim); }

  .seg {
    display: flex;
    gap: 4px;
    background: var(--panel-2);
    padding: 4px;
    border-radius: 9px;
    border: 1px solid var(--border);
  }
  .seg button {
    flex: 1;
    padding: 8px 6px;
    background: transparent;
    border: none;
    border-radius: 6px;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .seg button.active {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .seg button small {
    display: block;
    font-size: 9.5px;
    font-family: var(--mono);
    letter-spacing: 0.05em;
    opacity: 0.7;
    margin-top: 1px;
  }

  /* transport buttons */
  .transport {
    display: grid;
    grid-template-columns: 1.3fr 1fr 1fr;
    gap: 7px;
    margin-bottom: 16px;
  }
  .btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 12px 6px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.05s;
  }
  .btn:hover { background: var(--panel-3); border-color: var(--border-light); }
  .btn:active { transform: scale(0.97); }
  .btn svg { width: 18px; height: 18px; }
  .btn.primary {
    background: var(--good-soft);
    border-color: rgba(74, 222, 128, 0.3);
    color: var(--good);
  }
  .btn.primary.is-playing {
    background: var(--accent-soft);
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  /* object list */
  .obj-list {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 6px;
    max-height: 150px;
    overflow-y: auto;
    scrollbar-width: thin;
  }
  .obj-list:empty::after {
    content: '아직 물체가 없습니다';
    display: block;
    padding: 14px 8px;
    text-align: center;
    font-size: 12px;
    color: var(--text-faint);
  }
  .obj-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 9px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .obj-item:hover { background: var(--panel-3); }
  .obj-item.selected { background: var(--accent-soft); }
  .obj-item .swatch {
    width: 11px; height: 11px; border-radius: 50%;
    flex-shrink: 0;
  }
  .obj-item .name { flex: 1; font-size: 12.5px; color: var(--text); }
  .obj-item .meta {
    font-family: var(--mono); font-size: 10.5px; color: var(--text-faint);
  }
  .obj-item .del {
    background: none; border: none; color: var(--text-faint);
    cursor: pointer; padding: 2px; display: flex;
  }
  .obj-item .del:hover { color: var(--danger); }
  .obj-item .del svg { width: 14px; height: 14px; }

  /* telemetry readouts */
  .telemetry {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
  }
  .readout {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 11px;
  }
  .readout.wide { grid-column: 1 / -1; }
  .readout .rk {
    font-size: 10.5px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .readout .rv {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }
  .readout .rv .unit {
    font-size: 11px;
    color: var(--text-faint);
    margin-left: 3px;
  }
  .readout .rv.accent { color: var(--accent); }

  /* help note */
  .note {
    display: flex;
    gap: 9px;
    background: var(--accent-soft);
    border: 1px solid var(--accent-dim);
    border-radius: 9px;
    padding: 11px 13px;
    font-size: 12px;
    line-height: 1.55;
    color: var(--text-dim);
  }
  .note svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--accent); margin-top: 1px; }
  .note b { color: var(--accent); font-weight: 600; }

  .check-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 0;
  }
  .check-row label { font-size: 12.5px; color: var(--text-dim); }
  .switch {
    position: relative;
    width: 40px; height: 22px;
    background: var(--panel-3);
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .switch.on { background: var(--accent-dim); }
  .switch .knob {
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    background: var(--text);
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .switch.on .knob { transform: translateX(18px); background: var(--accent); }

  /* mobile */
  @media (max-width: 860px) {
    .topbar { gap: 0.75rem; padding: 0 0.75rem; }
    .brand .sub { display: none; }
    .panel-toggle { display: flex; }
    .sidebar {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: min(340px, 88vw);
      z-index: 30;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      box-shadow: -8px 0 32px rgba(0,0,0,0.5);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-head .close { display: block; }
    .scrim {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 25;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .scrim.show { opacity: 1; pointer-events: auto; }
    .tab span.lbl { display: none; }
    .tab { padding: 8px 10px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <span class="logo">물리학 시뮬레이터<span class="dot">.</span></span>
      <span class="sub">Physics Lab</span>
    </div>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-sim="orbit">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><ellipse cx="12" cy="12" rx="10" ry="4.5" transform="rotate(-20 12 12)"/></svg>
        <span class="lbl">행성 궤도</span>
      </button>
      <button class="tab" data-sim="pendulum">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16"/><path d="M12 4l4 11"/><circle cx="16" cy="17" r="3"/></svg>
        <span class="lbl">진자 운동</span>
      </button>
      <button class="tab" data-sim="wave">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12c2.5-7 5-7 7.5 0s5 7 7.5 0 2.5-7 5 0"/></svg>
        <span class="lbl">파동</span>
      </button>
      <button class="tab" data-sim="collision">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="7" cy="12" r="4"/><circle cx="18" cy="12" r="3"/><path d="M13 9l2-2M13 15l2 2"/></svg>
        <span class="lbl">충돌</span>
      </button>
      <button class="tab" data-sim="projectile">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 21C5 11 12 5 21 4"/><circle cx="5" cy="20" r="1.5" fill="currentColor"/><path d="M21 4l-4 1M21 4l-1 4"/></svg>
        <span class="lbl">포물선</span>
      </button>
    </nav>
    <button class="panel-toggle" id="panelToggle" aria-label="제어판 열기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </header>

  <!-- Stage -->
  <main class="stage">
    <div class="canvas-wrap">
      <canvas id="stage-canvas"></canvas>
      <div class="overlay-hint" id="hint"></div>
      <div class="statusbar" id="statusbar">
        <span class="run-dot" id="runDot"></span>
        <span class="stat"><span class="k">상태</span><span class="v" id="st-state">준비</span></span>
        <span class="stat"><span class="k">경과</span><span class="v" id="st-time">0.0s</span></span>
        <span class="stat" id="st-extra1"></span>
        <span class="stat" id="st-extra2"></span>
        <span class="stat" id="st-extra3"></span>
      </div>
    </div>

    <div class="scrim" id="scrim"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <h2>제어판 · Controls</h2>
        <button class="close" id="sidebarClose" aria-label="닫기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="sidebar-body" id="panels">
        <!-- Panels injected by JS -->
      </div>
    </aside>
  </main>
</div>

<script src="physics-lab.js"></script>
</body>
</html>
