<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>물리학 시뮬레이터 · Physics Lab</title>
<style>
  :root {
    --bg: #0a0e17;
    --bg-canvas: #070b13;
    --panel: #111726;
    --panel-2: #18202f;
    --panel-3: #1e2839;
    --border: #232f43;
    --border-light: #2f3d54;
    --text: #e6edf5;
    --text-dim: #8a98ad;
    --text-faint: #57647d;
    --accent: #45c7e0;
    --accent-dim: #2a7a8a;
    --accent-soft: rgba(69, 199, 224, 0.12);
    --good: #4ade80;
    --good-soft: rgba(74, 222, 128, 0.12);
    --warn: #fbbf24;
    --danger: #f87171;
    --danger-soft: rgba(248, 113, 113, 0.12);
    --mono: 'SF Mono', 'JetBrains Mono', 'Roboto Mono', ui-monospace, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* ---------- Top bar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    padding: 0 1.25rem;
    height: 56px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 20;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    flex-shrink: 0;
  }
  .brand .logo {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .brand .logo .dot { color: var(--accent); }
  .brand .sub {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--mono);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .tabs {
    display: flex;
    gap: 2px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 13px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .tab:hover { background: var(--panel-2); color: var(--text); }
  .tab.active {
    background: var(--accent-soft);
    border-color: var(--accent-dim);
    color: var(--accent);
  }
  .tab .ico { width: 16px; height: 16px; display: block; }

  .panel-toggle {
    display: none;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    flex-shrink: 0;
  }
  .panel-toggle svg { width: 18px; height: 18px; }

  /* ---------- Stage ---------- */
  .stage {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .canvas-wrap {
    flex: 1;
    position: relative;
    background: var(--bg-canvas);
    overflow: hidden;
  }

  canvas#stage-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }

  .overlay-hint {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 16px;
    background: rgba(17, 23, 38, 0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12.5px;
    color: var(--text-dim);
    pointer-events: none;
    white-space: nowrap;
    max-width: 90%;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: opacity 0.3s;
    z-index: 5;
  }
  .overlay-hint b { color: var(--accent); font-weight: 600; }

  .statusbar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 9px 18px;
    background: rgba(10, 14, 23, 0.9);
    backdrop-filter: blur(8px);
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--text-faint);
    overflow-x: auto;
    scrollbar-width: none;
    z-index: 5;
  }
  .statusbar::-webkit-scrollbar { display: none; }
  .statusbar .stat { display: flex; gap: 6px; white-space: nowrap; }
  .statusbar .stat .k { color: var(--text-faint); }
  .statusbar .stat .v { color: var(--text); }
  .statusbar .run-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-faint);
    flex-shrink: 0;
  }
  .statusbar .run-dot.running { background: var(--good); box-shadow: 0 0 8px var(--good); }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 340px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-head h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .sidebar-head .close {
    display: none;
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; padding: 4px;
  }
  .sidebar-head .close svg { width: 18px; height: 18px; }

  .sidebar-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px 32px;
    scrollbar-width: thin;
    scrollbar-color: var(--border-light) transparent;
  }
  .sidebar-body::-webkit-scrollbar { width: 8px; }
  .sidebar-body::-webkit-scrollbar-thumb {
    background: var(--border-light); border-radius: 4px;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ---------- Control components ---------- */
  .group { margin-bottom: 22px; }
  .group:last-child { margin-bottom: 0; }

  .group-label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-faint);
    margin-bottom: 12px;
  }
  .group-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }

  .field-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 7px;
  }
  .field-row label {
    font-size: 12.5px;
    color: var(--text-dim);
  }
  .field-row .val {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 2px 8px;
    border-radius: 5px;
    min-width: 44px;
    text-align: center;
    cursor: pointer;
    transition: background 0.12s;
  }
  .field-row .val:hover { background: rgba(69, 199, 224, 0.22); }
  .field-row .val.editing { padding: 1px; background: transparent; }
  .field-row .val input.val-edit {
    width: 52px;
    box-sizing: border-box;
    background: var(--bg);
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    border-radius: 4px;
    padding: 1px 0;
    outline: none;
    -moz-appearance: textfield;
    appearance: textfield;
  }
  .field-row .val input.val-edit::-webkit-outer-spin-button,
  .field-row .val input.val-edit::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: var(--panel-3);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
    cursor: pointer;
    box-shadow: 0 0 0 1px var(--accent-dim);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
    cursor: pointer;
  }

  input[type="number"] {
    width: 100%;
    padding: 9px 11px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="number"]:focus { border-color: var(--accent-dim); }

  .seg {
    display: flex;
    gap: 4px;
    background: var(--panel-2);
    padding: 4px;
    border-radius: 9px;
    border: 1px solid var(--border);
  }
  .seg button {
    flex: 1;
    padding: 8px 6px;
    background: transparent;
    border: none;
    border-radius: 6px;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .seg button.active {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .seg button small {
    display: block;
    font-size: 9.5px;
    font-family: var(--mono);
    letter-spacing: 0.05em;
    opacity: 0.7;
    margin-top: 1px;
  }

  /* transport buttons */
  .transport {
    display: grid;
    grid-template-columns: 1.3fr 1fr 1fr;
    gap: 7px;
    margin-bottom: 16px;
  }
  .btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 12px 6px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.05s;
  }
  .btn:hover { background: var(--panel-3); border-color: var(--border-light); }
  .btn:active { transform: scale(0.97); }
  .btn svg { width: 18px; height: 18px; }
  .btn.primary {
    background: var(--good-soft);
    border-color: rgba(74, 222, 128, 0.3);
    color: var(--good);
  }
  .btn.primary.is-playing {
    background: var(--accent-soft);
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  /* object list */
  .obj-list {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 6px;
    max-height: 150px;
    overflow-y: auto;
    scrollbar-width: thin;
  }
  .obj-list:empty::after {
    content: '아직 물체가 없습니다';
    display: block;
    padding: 14px 8px;
    text-align: center;
    font-size: 12px;
    color: var(--text-faint);
  }
  .obj-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 9px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .obj-item:hover { background: var(--panel-3); }
  .obj-item.selected { background: var(--accent-soft); }
  .obj-item .swatch {
    width: 11px; height: 11px; border-radius: 50%;
    flex-shrink: 0;
  }
  .obj-item .name { flex: 1; font-size: 12.5px; color: var(--text); }
  .obj-item .meta {
    font-family: var(--mono); font-size: 10.5px; color: var(--text-faint);
  }
  .obj-item .del {
    background: none; border: none; color: var(--text-faint);
    cursor: pointer; padding: 2px; display: flex;
  }
  .obj-item .del:hover { color: var(--danger); }
  .obj-item .del svg { width: 14px; height: 14px; }

  /* telemetry readouts */
  .telemetry {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
  }
  .readout {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 11px;
  }
  .readout.wide { grid-column: 1 / -1; }
  .readout .rk {
    font-size: 10.5px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .readout .rv {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }
  .readout .rv .unit {
    font-size: 11px;
    color: var(--text-faint);
    margin-left: 3px;
  }
  .readout .rv.accent { color: var(--accent); }

  /* help note */
  .note {
    display: flex;
    gap: 9px;
    background: var(--accent-soft);
    border: 1px solid var(--accent-dim);
    border-radius: 9px;
    padding: 11px 13px;
    font-size: 12px;
    line-height: 1.55;
    color: var(--text-dim);
  }
  .note svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--accent); margin-top: 1px; }
  .note b { color: var(--accent); font-weight: 600; }

  .check-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 0;
  }
  .check-row label { font-size: 12.5px; color: var(--text-dim); }
  .switch {
    position: relative;
    width: 40px; height: 22px;
    background: var(--panel-3);
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .switch.on { background: var(--accent-dim); }
  .switch .knob {
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    background: var(--text);
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .switch.on .knob { transform: translateX(18px); background: var(--accent); }

  /* mobile */
  @media (max-width: 860px) {
    .topbar { gap: 0.75rem; padding: 0 0.75rem; }
    .brand .sub { display: none; }
    .panel-toggle { display: flex; }
    .sidebar {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: min(340px, 88vw);
      z-index: 30;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      box-shadow: -8px 0 32px rgba(0,0,0,0.5);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-head .close { display: block; }
    .scrim {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 25;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .scrim.show { opacity: 1; pointer-events: auto; }
    .tab span.lbl { display: none; }
    .tab { padding: 8px 10px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <span class="logo">물리학 시뮬레이터<span class="dot">.</span></span>
      <span class="sub">Physics Lab</span>
    </div>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-sim="orbit">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><ellipse cx="12" cy="12" rx="10" ry="4.5" transform="rotate(-20 12 12)"/></svg>
        <span class="lbl">행성 궤도</span>
      </button>
      <button class="tab" data-sim="pendulum">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16"/><path d="M12 4l4 11"/><circle cx="16" cy="17" r="3"/></svg>
        <span class="lbl">진자 운동</span>
      </button>
      <button class="tab" data-sim="wave">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12c2.5-7 5-7 7.5 0s5 7 7.5 0 2.5-7 5 0"/></svg>
        <span class="lbl">파동</span>
      </button>
      <button class="tab" data-sim="collision">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="7" cy="12" r="4"/><circle cx="18" cy="12" r="3"/><path d="M13 9l2-2M13 15l2 2"/></svg>
        <span class="lbl">충돌</span>
      </button>
      <button class="tab" data-sim="projectile">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 21C5 11 12 5 21 4"/><circle cx="5" cy="20" r="1.5" fill="currentColor"/><path d="M21 4l-4 1M21 4l-1 4"/></svg>
        <span class="lbl">포물선</span>
      </button>
    </nav>
    <button class="panel-toggle" id="panelToggle" aria-label="제어판 열기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </header>

  <!-- Stage -->
  <main class="stage">
    <div class="canvas-wrap">
      <canvas id="stage-canvas"></canvas>
      <div class="overlay-hint" id="hint"></div>
      <div class="statusbar" id="statusbar">
        <span class="run-dot" id="runDot"></span>
        <span class="stat"><span class="k">상태</span><span class="v" id="st-state">준비</span></span>
        <span class="stat"><span class="k">경과</span><span class="v" id="st-time">0.0s</span></span>
        <span class="stat" id="st-extra1"></span>
        <span class="stat" id="st-extra2"></span>
        <span class="stat" id="st-extra3"></span>
      </div>
    </div>

    <div class="scrim" id="scrim"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <h2>제어판 · Controls</h2>
        <button class="close" id="sidebarClose" aria-label="닫기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="sidebar-body" id="panels">
        <!-- Panels injected by JS -->
      </div>
    </aside>
  </main>
</div>

<script>
/* =========================================================================
   물리학 시뮬레이터 · Physics Lab  — single-file engine
   ========================================================================= */
(function () {
  'use strict';

  /* ---------- helpers ---------- */
  const $ = (s, r) => (r || document).querySelector(s);
  const $$ = (s, r) => Array.from((r || document).querySelectorAll(s));
  const TAU = Math.PI * 2;
  const D2R = Math.PI / 180, R2D = 180 / Math.PI;
  const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
  const dist = (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by);
  function fmt(n, d) { d = d == null ? 1 : d; if (!isFinite(n)) return '–'; return n.toFixed(d); }
  const PALETTE = ['#45c7e0', '#4ade80', '#fbbf24', '#f87171', '#a78bfa', '#fb923c', '#38bdf8', '#f472b6'];
  const hexA = (hex, a) => hex + Math.round(clamp(a, 0, 1) * 255).toString(16).padStart(2, '0');

  const ICONS = {
    play: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
    pause: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>',
    reset: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 109-9 9 9 0 00-7 3.3M3 4v4h4"/></svg>',
    trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2M6 7l1 13a1 1 0 001 1h8a1 1 0 001-1l1-13"/></svg>',
    info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg>'
  };
  const transportHTML = () => `<div class="transport">
      <button class="btn primary btn-play">${ICONS.play}<span class="lbl">시작</span></button>
      <button class="btn btn-pause">${ICONS.pause}일시정지</button>
      <button class="btn btn-reset">${ICONS.reset}초기화</button>
    </div>`;

  /* =======================================================================
     ENGINE CORE
     ======================================================================= */
  const canvas = $('#stage-canvas');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, DPR = 1;
  let current = null;

  function resize() {
    const r = canvas.parentElement.getBoundingClientRect();
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = r.width; H = r.height;
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);

  window.addEventListener('resize', resize);

  function pos(e) {

  function drawGrid(step) {

    for (let x = (W / 2) % step; x < W; x += step) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }

  function arrow(x0, y0, x1, y1, color) {

  function BaseSim() { this.playing = false; this.time = 0; }

  /* =======================================================================
     SIM 1 — 행성 궤도
     ======================================================================= */
  const Orbit = (function () {
    const S = new BaseSim();
    S.id = 'orbit'; S.stars = []; S.bodies = []; S.G = 1; S.timeScale = 1;
    S.starCount = 2; S.selected = null; S.bodyInteract = false; S.trailKeep = false;
    let drag = null, dragStar = null, dragBody = null;
    const STAR_M = 4.0e6, STAR_SOFT = 3, BODY_SOFT = 12;

    function placeStars() {
      S.stars = [];
      const cx = W / 2, cy = H / 2, n = S.starCount;
      const colors = ['#fbbf24', '#fb923c', '#f472b6', '#a78bfa', '#38bdf8'];
      if (n === 1) S.stars.push({ x: cx, y: cy, m: STAR_M, r: 16, color: colors[0] });
      else {
        const R = Math.min(W, H) * 0.16;
        for (let i = 0; i < n; i++) {
          const a = -Math.PI / 2 + i * TAU / n;
          S.stars.push({ x: cx + Math.cos(a) * R, y: cy + Math.sin(a) * R, m: STAR_M / Math.sqrt(n), r: 14, color: colors[i % colors.length] });
        }
      }
    }
    S.onResize = function () { if (!S.stars.length || !S.playing) placeStars(); };
    S.reset = function () { S.pause(); S.time = 0; S.bodies = []; S.selected = null; drag = null; placeStars(); refreshList(); };
    S.enter = function () { placeStars(); S.time = 0; refreshList(); };

    function accel(bx, by, self) {
      let ax = 0, ay = 0;
      for (const s of S.stars) {
        const dx = s.x - bx, dy = s.y - by, r2 = dx * dx + dy * dy + STAR_SOFT * STAR_SOFT;
        const inv = S.G * s.m / (r2 * Math.sqrt(r2)); ax += dx * inv; ay += dy * inv;
      }
      if (S.bodyInteract) for (const o of S.bodies) {
        if (o === self) continue;
        const dx = o.x - bx, dy = o.y - by, r2 = dx * dx + dy * dy + BODY_SOFT * BODY_SOFT;
        const inv = S.G * o.m * 60 / (r2 * Math.sqrt(r2)); ax += dx * inv; ay += dy * inv;
      }
      return [ax, ay];
    }
    S.step = function (dt) {
      const h = 1 / 240; let t = Math.min(dt * S.timeScale, 1 / 20), g = 0;
      while (t > 0 && g++ < 800) {
        const s = Math.min(h, t); t -= s;
        // 속도 베를레(velocity Verlet): 심플렉틱 2차 → 에너지 보존이 좋아 세차가 거의 없음

        for (const b of S.bodies) { b.x += b.vx * s + 0.5 * b._ax * s * s; b.y += b.vy * s + 0.5 * b._ay * s * s; }
        for (const b of S.bodies) { const a = accel(b.x, b.y, b); b.vx += 0.5 * (b._ax + a[0]) * s; b.vy += 0.5 * (b._ay + a[1]) * s; }
        for (const b of S.bodies) {
          for (const st of S.stars) if (dist(b.x, b.y, st.x, st.y) < st.r) b._dead = true;
          if (b.x < -400 || b.x > W + 400 || b.y < -400 || b.y > H + 400) b._dead = true;
        }
      }
      if (S.bodies.some(b => b._dead)) { S.bodies = S.bodies.filter(b => !b._dead); refreshList(); }
      const trailCap = S.trailKeep ? 30000 : 360;
      for (const b of S.bodies) { b.trail.push(b.x, b.y); if (b.trail.length > trailCap) b.trail.splice(0, b.trail.length - trailCap); }

    S.draw = function () {

      for (const b of S.bodies) {
        glowDot(b.x, b.y, b.r, b.color, false);
        if (b === S.selected) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(b.x, b.y, b.r + 5, 0, TAU); ctx.stroke(); }
        if (S.playing) arrow(b.x, b.y, b.x + b.vx * 0.18, b.y + b.vy * 0.18, hexA(b.color, 0.65));
      }
      if (drag) {
        // 기준 별까지 보조선
        if (drag.star) {
          ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; ctx.setLineDash([3, 4]);
          ctx.beginPath(); ctx.moveTo(drag.x, drag.y); ctx.lineTo(drag.star.x, drag.star.y); ctx.stroke();
          ctx.setLineDash([]); ctx.restore();
        }
        // 예측 궤도 경로
        if (drag.path && drag.path.length > 4) {
          ctx.save(); ctx.strokeStyle = 'rgba(69,199,224,0.6)'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 5]); ctx.lineCap = 'round';
          ctx.beginPath(); ctx.moveTo(drag.path[0], drag.path[1]);
          for (let i = 2; i < drag.path.length; i += 2) ctx.lineTo(drag.path[i], drag.path[i + 1]);
          ctx.stroke(); ctx.setLineDash([]); ctx.restore();

    };

    const hitBody = (x, y) => S.bodies.find(b => dist(x, y, b.x, b.y) < b.r + 9);
    const nearestStar = (x, y) => {

    function starAccel(x, y) {
      let ax = 0, ay = 0;
      for (const s of S.stars) {
        const ddx = s.x - x, ddy = s.y - y, r2 = ddx * ddx + ddy * ddy + STAR_SOFT * STAR_SOFT;
        const inv = S.G * s.m / (r2 * Math.sqrt(r2)); ax += ddx * inv; ay += ddy * inv;

    function predictPath(px, py, vx, vy) {

    }
    S.pointerDown = function (p) {

    };
    S.pointerMove = function (p) {
      if (dragStar) { dragStar.x = p.x; dragStar.y = p.y; return; }

    };
    S.pointerUp = function () {
      if (dragStar) { dragStar = null; return; }
      if (dragBody) { dragBody = null; return; }

        const color = PALETTE[S.bodies.length % PALETTE.length];
        const b = { x: drag.x, y: drag.y, vx: drag.vx, vy: drag.vy, m: 1, r: 6, color, trail: [], name: '행성 ' + (S.bodies.length + 1) };
        S.bodies.push(b); S.selected = b; drag = null; refreshList();
      }
    };
    S.status = function () {
      const ex = [{ k: '중심별', v: S.starCount }, { k: '물체', v: S.bodies.length }];
      if (S.selected) ex.push({ k: 'v', v: fmt(Math.hypot(S.selected.vx, S.selected.vy), 0) + ' px/s' });
      return { state: S.playing ? '시뮬레이션 중' : (S.bodies.length ? '준비' : '물체를 배치하세요'), time: fmt(S.time, 1) + 's', extras: ex };
    };
    S.panelHTML = `
      <div class="group"><div class="group-label">시뮬레이션 설정</div>
        <div class="field"><div class="field-row"><label>중심별 개수</label><span class="val" id="o-starN-v">2</span></div><input type="range" id="o-starN" min="1" max="5" step="1" value="2"></div>
        <div class="field"><div class="field-row"><label>중력 상수 G</label><span class="val" id="o-G-v">1.0×</span></div><input type="range" id="o-G" min="0.2" max="3" step="0.1" value="1"></div>
        <div class="field"><div class="field-row"><label>시간 속도</label><span class="val" id="o-ts-v">1.0×</span></div><input type="range" id="o-ts" min="0.2" max="4" step="0.1" value="1"></div>
        <div class="check-row"><label>물체 간 인력</label><div class="switch" id="o-bi"><div class="knob"></div></div></div>
        <div class="check-row"><label>트레일 유지</label><div class="switch" id="o-tk"><div class="knob"></div></div></div>
      </div>
      ${transportHTML()}
      <div class="group"><div class="group-label">물체 관리</div><div class="obj-list" id="o-list"></div></div>
      <div class="group"><div class="group-label">계측 · Telemetry</div>
        <div class="telemetry">
          <div class="readout"><div class="rk">선택 속도</div><div class="rv accent" id="o-tv">–<span class="unit">px/s</span></div></div>
          <div class="readout"><div class="rk">중심까지 거리</div><div class="rv" id="o-td">–<span class="unit">px</span></div></div>
        </div>
      </div>
      <div class="note">${ICONS.info}<div><b>조작법:</b> 빈 공간을 누르면 그 자리에 행성이 놓이고 <b>가장 가까운 별 기준 원궤도</b>가 점선으로 미리 보입니다. 누른 채 끌면 끄는 <b>방향·세기</b>로 궤도 모양이 바뀝니다(별로 빨려들거나 튕겨나가지 않도록 자동 보정). 손을 떼면 배치 완료 — <b>시작</b>을 누르세요. 별·행성은 드래그로 옮길 수 있습니다.</div></div>`;
    function refreshList() {
      const el = $('#o-list'); if (!el) return; el.innerHTML = '';
      S.bodies.forEach((b, i) => {
        const row = document.createElement('div');
        row.className = 'obj-item' + (b === S.selected ? ' selected' : '');
        row.innerHTML = `<span class="swatch" style="background:${b.color}"></span><span class="name">${b.name}</span><button class="del">${ICONS.trash}</button>`;
        row.addEventListener('click', e => { if (e.target.closest('.del')) return; S.selected = b; refreshList(); });

      const tv = $('#o-tv'), td = $('#o-td'); if (!tv) return;
      if (S.selected) {
        tv.innerHTML = fmt(Math.hypot(S.selected.vx, S.selected.vy), 0) + '<span class="unit">px/s</span>';
        let dmin = Infinity; for (const s of S.stars) dmin = Math.min(dmin, dist(S.selected.x, S.selected.y, s.x, s.y));
        td.innerHTML = fmt(dmin, 0) + '<span class="unit">px</span>';

    };
    S.bind = function (root) {
      const sN = $('#o-starN', root), sNv = $('#o-starN-v', root);
      sN.addEventListener('input', () => { S.starCount = +sN.value; sNv.textContent = sN.value; placeStars(); S.bodies = []; S.selected = null; S.time = 0; refreshList(); });
      const g = $('#o-G', root), gv = $('#o-G-v', root);

  })();

  /* =======================================================================
     SIM 2 — 진자 운동
     ======================================================================= */
  const Pendulum = (function () {
    const S = new BaseSim();
    S.id = 'pendulum'; S.type = 'double';
    S.L1 = 150; S.L2 = 130; S.m1 = 12; S.m2 = 12; S.g = 900; S.damp = 0; S.trailOn = true;
    let th1 = 2.2, th2 = 2.4, w1 = 0, w2 = 0, trail = [], dragWhich = 0;
    const pivot = () => ({ x: W / 2, y: H * 0.26 });
    const bobR = m => 7 + Math.sqrt(m) * 2.2;

    S.onResize = () => { trail = []; };
    S.reset = function () { S.pause(); S.time = 0; th1 = S.type === 'single' ? 1.4 : 2.2; th2 = 2.4; w1 = w2 = 0; trail = []; };
    S.enter = function () { S.time = 0; trail = []; };
    const accSingle = () => -(S.g / S.L1) * Math.sin(th1) - S.damp * w1;
    function accDouble() {
      const m1 = S.m1, m2 = S.m2, L1 = S.L1, L2 = S.L2, g = S.g;
      const d = th1 - th2, sd = Math.sin(d), cd = Math.cos(d);
      const den = 2 * m1 + m2 - m2 * Math.cos(2 * d);
      const a1 = (-g * (2 * m1 + m2) * Math.sin(th1) - m2 * g * Math.sin(th1 - 2 * th2) - 2 * sd * m2 * (w2 * w2 * L2 + w1 * w1 * L1 * cd)) / (L1 * den) - S.damp * w1;
      const a2 = (2 * sd * (w1 * w1 * L1 * (m1 + m2) + g * (m1 + m2) * Math.cos(th1) + w2 * w2 * L2 * m2 * cd)) / (L2 * den) - S.damp * w2;
      return [a1, a2];
    }
    S.step = function (dt) {
      const h = 1 / 600; let t = Math.min(dt, 1 / 20), gd = 0;
      while (t > 0 && gd++ < 1000) {
        const s = Math.min(h, t); t -= s;
        if (S.type === 'single') { w1 += accSingle() * s; th1 += w1 * s; }
        else { const [a1, a2] = accDouble(); w1 += a1 * s; w2 += a2 * s; th1 += w1 * s; th2 += w2 * s; }
      }
      const p = pivot(), x1 = p.x + S.L1 * Math.sin(th1), y1 = p.y + S.L1 * Math.cos(th1);
      const ex = S.type === 'single' ? x1 : x1 + S.L2 * Math.sin(th2);
      const ey = S.type === 'single' ? y1 : y1 + S.L2 * Math.cos(th2);
      if (S.trailOn) { trail.push(ex, ey); if (trail.length > 640) trail.splice(0, trail.length - 640); }

    };
    S.draw = function () {

      const p = pivot(), x1 = p.x + S.L1 * Math.sin(th1), y1 = p.y + S.L1 * Math.cos(th1);

      ctx.fillStyle = '#2f3d54'; ctx.fillRect(p.x - 26, p.y - 7, 52, 7);
      ctx.fillStyle = '#57647d'; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, TAU); ctx.fill();
      ctx.strokeStyle = '#8a98ad'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(x1, y1); ctx.stroke();
      glowDot(x1, y1, bobR(S.m1), '#45c7e0', true);
      if (S.type === 'double') {
        ctx.strokeStyle = '#8a98ad'; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        glowDot(x2, y2, bobR(S.m2), '#a78bfa', true);
      }
      if (!S.playing) {
        ctx.strokeStyle = 'rgba(255,255,255,0.16)'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y + 70); ctx.stroke(); ctx.setLineDash([]);
      }
    };
    S.pointerDown = function (pt) {
      const p = pivot(), x1 = p.x + S.L1 * Math.sin(th1), y1 = p.y + S.L1 * Math.cos(th1);
      const x2 = x1 + S.L2 * Math.sin(th2), y2 = y1 + S.L2 * Math.cos(th2);
      if (S.type === 'double' && dist(pt.x, pt.y, x2, y2) < bobR(S.m2) + 14) { dragWhich = 2; S.pause(); return; }
      if (dist(pt.x, pt.y, x1, y1) < bobR(S.m1) + 14) { dragWhich = 1; S.pause(); }
    };
    S.pointerMove = function (pt) {
      if (!dragWhich) return; const p = pivot();
      if (dragWhich === 1) { th1 = Math.atan2(pt.x - p.x, pt.y - p.y); }
      else { const x1 = p.x + S.L1 * Math.sin(th1), y1 = p.y + S.L1 * Math.cos(th1); th2 = Math.atan2(pt.x - x1, pt.y - y1); }
      w1 = w2 = 0; trail = [];
    };
    S.pointerUp = () => { dragWhich = 0; };
    function totalEnergy() {
      const p = pivot(), y1 = p.y + S.L1 * Math.cos(th1);
      const v1x = S.L1 * Math.cos(th1) * w1, v1y = -S.L1 * Math.sin(th1) * w1;
      if (S.type === 'single') return (0.5 * S.m1 * (v1x * v1x + v1y * v1y) + S.m1 * S.g * (-y1)) / 1e5;
      const v2x = v1x + S.L2 * Math.cos(th2) * w2, v2y = v1y - S.L2 * Math.sin(th2) * w2;
      const y2 = y1 + S.L2 * Math.cos(th2);
      const ke = 0.5 * S.m1 * (v1x * v1x + v1y * v1y) + 0.5 * S.m2 * (v2x * v2x + v2y * v2y);
      return (ke + S.m1 * S.g * (-y1) + S.m2 * S.g * (-y2)) / 1e5;
    }
    S.status = function () {
      const ex = [{ k: '유형', v: S.type === 'single' ? '단일' : '이중' }, { k: 'θ₁', v: fmt(th1 * R2D % 360, 0) + '°' }];
      if (S.type === 'double') ex.push({ k: 'θ₂', v: fmt(th2 * R2D % 360, 0) + '°' });
      return { state: S.playing ? '진동 중' : '질점을 끌어 각도 설정', time: fmt(S.time, 1) + 's', extras: ex };
    };
    S.panelHTML = `
      <div class="group"><div class="group-label">진자 유형</div>
        <div class="seg" id="p-type"><button data-v="single">단일<small>SINGLE</small></button><button data-v="double" class="active">이중<small>DOUBLE</small></button></div>
      </div>

        <div class="field" id="p-l2-f"><div class="field-row"><label>길이 L₂</label><span class="val" id="p-l2-v">130</span></div><input type="range" id="p-l2" min="60" max="240" step="5" value="130"></div>
        <div class="field"><div class="field-row"><label>질량 m₁</label><span class="val" id="p-m1-v">12</span></div><input type="range" id="p-m1" min="2" max="40" step="1" value="12"></div>
        <div class="field" id="p-m2-f"><div class="field-row"><label>질량 m₂</label><span class="val" id="p-m2-v">12</span></div><input type="range" id="p-m2" min="2" max="40" step="1" value="12"></div>
      </div>

      </div>
      ${transportHTML()}
      <div class="group"><div class="group-label">계측 · Telemetry</div>
        <div class="telemetry">
          <div class="readout"><div class="rk">각속도 ω₁</div><div class="rv accent" id="p-w1">0.00<span class="unit">rad/s</span></div></div>
          <div class="readout" id="p-w2-r"><div class="rk">각속도 ω₂</div><div class="rv" id="p-w2">0.00<span class="unit">rad/s</span></div></div>

      <div class="note">${ICONS.info}<div><b>조작법:</b> 질점(공)을 끌어 <b>초기 각도</b>를 정한 뒤 <b>시작</b>을 누르세요. 이중 진자는 작은 차이가 큰 차이를 낳는 <b>카오스</b>를 보여줍니다.</div></div>`;
    S.tickPanel = function () {

    function applyType() {

      bs('p-l1', 'L1'); bs('p-l2', 'L2'); bs('p-m1', 'm1'); bs('p-m2', 'm2'); bs('p-g', 'g'); bs('p-d', 'damp', v => v.toFixed(2));

  /* =======================================================================
     SIM 3 — 파동 (analytic transverse waves)
     ======================================================================= */
  const Wave = (function () {
    const S = new BaseSim();
    S.id = 'wave'; S.mode = 'single';   // single | superpose | standing
    S.amp = 60; S.freq = 0.6; S.wavelen = 220; S.speedScale = 1;
    // second wave (for superpose)
    S.amp2 = 50; S.wavelen2 = 160; S.dir2 = 1;
    let t = 0;

    S.reset = function () { S.pause(); S.time = 0; t = 0; };
    S.enter = function () { S.time = 0; t = 0; };
    S.step = function (dt) { t += dt * S.speedScale; S.time += dt; };

    function waveY(x, A, lam, dir, ph) {
      const k = TAU / lam, w = TAU * S.freq * S.speedScale === 0 ? 0 : TAU * S.freq;
      return A * Math.sin(k * x * dir - w * t + (ph || 0));
    }
    S.draw = function () {
      const mid = H / 2;
      // axis
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(W, mid); ctx.stroke();
      // amplitude guides
      ctx.setLineDash([3, 5]); ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.beginPath(); ctx.moveTo(0, mid - S.amp); ctx.lineTo(W, mid - S.amp); ctx.moveTo(0, mid + S.amp); ctx.lineTo(W, mid + S.amp); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();

      const stepX = 2;
      const drawCurve = (fn, color, width, alpha) => {
        ctx.save(); ctx.strokeStyle = hexA(color, alpha == null ? 1 : alpha); ctx.lineWidth = width; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath();
        for (let x = 0; x <= W; x += stepX) { const y = mid - fn(x); if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); }
        ctx.stroke(); ctx.restore();
      };
      const w1 = x => waveY(x, S.amp, S.wavelen, 1, 0);
      if (S.mode === 'single') {
        drawCurve(w1, '#45c7e0', 2.5);
      } else if (S.mode === 'superpose') {
        const w2 = x => waveY(x, S.amp2, S.wavelen2, S.dir2, 0);
        drawCurve(w1, '#45c7e0', 1.5, 0.4);
        drawCurve(w2, '#a78bfa', 1.5, 0.4);
        drawCurve(x => w1(x) + w2(x), '#4ade80', 2.6);
      } else { // standing wave = two opposite traveling waves
        const k = TAU / S.wavelen, w = TAU * S.freq;
        const stand = x => 2 * S.amp * Math.sin(k * x) * Math.cos(w * t);
        // nodes
        const lam = S.wavelen;
        ctx.save();
        for (let x = 0; x <= W; x += lam / 2) { ctx.fillStyle = '#57647d'; ctx.beginPath(); ctx.arc(x, mid, 3, 0, TAU); ctx.fill(); }
        ctx.restore();
        drawCurve(x => S.amp * Math.sin(k * x - w * t), '#45c7e0', 1.2, 0.25);
        drawCurve(x => S.amp * Math.sin(k * x + w * t), '#a78bfa', 1.2, 0.25);
        drawCurve(stand, '#4ade80', 2.6);
      }
      // moving marker dots on resultant
      ctx.save();
      const markFn = S.mode === 'standing'
        ? (x => 2 * S.amp * Math.sin(TAU / S.wavelen * x) * Math.cos(TAU * S.freq * t))
        : (S.mode === 'superpose' ? (x => w1(x) + waveY(x, S.amp2, S.wavelen2, S.dir2, 0)) : w1);
      for (let x = 60; x < W; x += 140) { ctx.fillStyle = '#e6edf5'; ctx.beginPath(); ctx.arc(x, mid - markFn(x), 4, 0, TAU); ctx.fill(); }
      ctx.restore();
    };
    S.pointerDown = function (p) { S._drag = true; S._dragMode(p); };
    S.pointerMove = function (p) { if (S._drag) S._dragMode(p); };
    S.pointerUp = function () { S._drag = false; };
    S._dragMode = function (p) {
      // vertical drag -> amplitude, horizontal pos -> wavelength
      S.amp = clamp(Math.abs(H / 2 - p.y), 8, H / 2 - 30);
      S.wavelen = clamp(60 + (p.x / W) * 360, 60, 420);
      syncSliders();
    };
    S.status = function () {
      const v = S.freq * S.wavelen;
      const modeName = { single: '단일파', superpose: '중첩(간섭)', standing: '정상파' }[S.mode];
      return { state: modeName, time: fmt(S.time, 1) + 's', extras: [{ k: 'f', v: fmt(S.freq, 2) + ' Hz' }, { k: 'λ', v: fmt(S.wavelen, 0) + ' px' }, { k: 'v=fλ', v: fmt(v, 0) + ' px/s' }] };
    };
    S.panelHTML = `
      <div class="group"><div class="group-label">파동 모드</div>
        <div class="seg" id="w-mode">
          <button data-v="single" class="active">단일<small>SINGLE</small></button>
          <button data-v="superpose">중첩<small>SUPER</small></button>
          <button data-v="standing">정상파<small>STAND</small></button>
        </div>
      </div>
      <div class="group"><div class="group-label">파동 1 (청록)</div>
        <div class="field"><div class="field-row"><label>진폭 A</label><span class="val" id="w-amp-v">60</span></div><input type="range" id="w-amp" min="8" max="160" step="2" value="60"></div>
        <div class="field"><div class="field-row"><label>진동수 f</label><span class="val" id="w-freq-v">0.60</span></div><input type="range" id="w-freq" min="0.1" max="2" step="0.05" value="0.6"></div>
        <div class="field"><div class="field-row"><label>파장 λ</label><span class="val" id="w-lam-v">220</span></div><input type="range" id="w-lam" min="60" max="420" step="5" value="220"></div>
      </div>
      <div class="group" id="w-g2"><div class="group-label">파동 2 (보라)</div>
        <div class="field"><div class="field-row"><label>진폭 A₂</label><span class="val" id="w-amp2-v">50</span></div><input type="range" id="w-amp2" min="8" max="160" step="2" value="50"></div>
        <div class="field"><div class="field-row"><label>파장 λ₂</label><span class="val" id="w-lam2-v">160</span></div><input type="range" id="w-lam2" min="60" max="420" step="5" value="160"></div>
        <div class="check-row"><label>반대 방향 진행</label><div class="switch" id="w-dir2"><div class="knob"></div></div></div>
      </div>
      <div class="group"><div class="group-label">전파 속도</div>
        <div class="field"><div class="field-row"><label>시간 속도</label><span class="val" id="w-ss-v">1.0×</span></div><input type="range" id="w-ss" min="0" max="3" step="0.1" value="1"></div>
      </div>
      ${transportHTML()}
      <div class="group"><div class="group-label">계측 · Telemetry</div>
        <div class="telemetry">
          <div class="readout"><div class="rk">파동 속도 v</div><div class="rv accent" id="w-v">132<span class="unit">px/s</span></div></div>
          <div class="readout"><div class="rk">주기 T</div><div class="rv" id="w-T">1.67<span class="unit">s</span></div></div>
          <div class="readout"><div class="rk">파수 k</div><div class="rv" id="w-k">0.029<span class="unit">/px</span></div></div>
          <div class="readout"><div class="rk">각진동수 ω</div><div class="rv" id="w-w">3.77<span class="unit">/s</span></div></div>
        </div>
      </div>
      <div class="note">${ICONS.info}<div><b>관계식:</b> v = f λ. 캔버스를 <b>위아래로 끌면 진폭</b>, <b>좌우로 끌면 파장</b>이 바뀝니다. <b>중첩</b> 모드는 두 파동의 간섭을, <b>정상파</b>는 마디·배를 보여줍니다.</div></div>`;
    function syncSliders() {
      const a = $('#w-amp'), av = $('#w-amp-v'), l = $('#w-lam'), lv = $('#w-lam-v');
      if (a) { a.value = S.amp; av.textContent = Math.round(S.amp); }
      if (l) { l.value = S.wavelen; lv.textContent = Math.round(S.wavelen); }
    }
    S.tickPanel = function () {
      const v = S.freq * S.wavelen, k = TAU / S.wavelen, w = TAU * S.freq, T = 1 / S.freq;
      const ve = $('#w-v'), Te = $('#w-T'), ke = $('#w-k'), we = $('#w-w');
      if (ve) ve.innerHTML = fmt(v, 0) + '<span class="unit">px/s</span>';
      if (Te) Te.innerHTML = fmt(T, 2) + '<span class="unit">s</span>';
      if (ke) ke.innerHTML = fmt(k, 3) + '<span class="unit">/px</span>';
      if (we) we.innerHTML = fmt(w, 2) + '<span class="unit">/s</span>';
    };
    function applyMode() { const g2 = $('#w-g2'); if (g2) g2.style.display = S.mode === 'superpose' ? '' : 'none'; }
    S.bind = function (root) {
      const seg = $('#w-mode', root);
      $$('button', seg).forEach(b => b.addEventListener('click', () => { $$('button', seg).forEach(x => x.classList.remove('active')); b.classList.add('active'); S.mode = b.dataset.v; applyMode(); }));
      const bs = (id, prop, lab) => { const s = $('#' + id, root), v = $('#' + id + '-v', root); s.addEventListener('input', () => { S[prop] = +s.value; v.textContent = lab ? lab(+s.value) : s.value; }); };
      bs('w-amp', 'amp'); bs('w-freq', 'freq', v => v.toFixed(2)); bs('w-lam', 'wavelen');
      bs('w-amp2', 'amp2'); bs('w-lam2', 'wavelen2'); bs('w-ss', 'speedScale', v => v.toFixed(1) + '×');
      const d2 = $('#w-dir2', root);
      d2.addEventListener('click', () => { S.dir2 = S.dir2 === 1 ? -1 : 1; d2.classList.toggle('on', S.dir2 === -1); });
      applyMode();
    };
    return S;
  })();

  /* =======================================================================
     SIM 4 — 충돌 (2D balls, momentum conservation)
     ======================================================================= */
  const Collision = (function () {
    const S = new BaseSim();
    S.id = 'collision'; S.balls = []; S.e = 1.0; S.gravity = 1; S.timeScale = 1;
    const G_EARTH = 700; // 1.00 g = 지구 중력가속도(9.8 m/s²) ≈ 700 px/s²
    let drag = null;
    const PAD = 0; // walls at canvas edge

    S.reset = function () { S.pause(); S.time = 0; S.balls = []; drag = null; };
    S.enter = function () { S.time = 0; };
    function collideWalls(b) {
      if (b.x - b.r < 0) { b.x = b.r; b.vx = -b.vx * S.e; }
      if (b.x + b.r > W) { b.x = W - b.r; b.vx = -b.vx * S.e; }
      if (b.y - b.r < 0) { b.y = b.r; b.vy = -b.vy * S.e; }
      if (b.y + b.r > H) { b.y = H - b.r; b.vy = -b.vy * S.e; }
    }
    function collidePair(a, b) {
      const dx = b.x - a.x, dy = b.y - a.y, d = Math.hypot(dx, dy), min = a.r + b.r;
      if (d === 0 || d >= min) return;
      const nx = dx / d, ny = dy / d;
      const overlap = min - d;
      const tm = a.m + b.m;
      a.x -= nx * overlap * (b.m / tm); a.y -= ny * overlap * (b.m / tm);
      b.x += nx * overlap * (a.m / tm); b.y += ny * overlap * (a.m / tm);
      const rvx = b.vx - a.vx, rvy = b.vy - a.vy;
      const vn = rvx * nx + rvy * ny;
      if (vn > 0) return;
      const imp = -(1 + S.e) * vn / (1 / a.m + 1 / b.m);
      const ix = imp * nx, iy = imp * ny;
      a.vx -= ix / a.m; a.vy -= iy / a.m; b.vx += ix / b.m; b.vy += iy / b.m;
    }
    S.step = function (dt) {
      const h = 1 / 240; let tt = Math.min(dt * S.timeScale, 1 / 20), gd = 0;
      while (tt > 0 && gd++ < 800) {
        const s = Math.min(h, tt); tt -= s;
        for (const b of S.balls) { b.vy += S.gravity * G_EARTH * s; b.x += b.vx * s; b.y += b.vy * s; collideWalls(b); }
        for (let i = 0; i < S.balls.length; i++) for (let j = i + 1; j < S.balls.length; j++) collidePair(S.balls[i], S.balls[j]);
      }
      S.time += dt * S.timeScale;
    };
    S.draw = function () {
      drawGrid();
      // walls
      ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 2;
      ctx.strokeRect(1, 1, W - 2, H - 2);
      for (const b of S.balls) {
        glowDot(b.x, b.y, b.r, b.color, false);
        if (S.playing && (b.vx || b.vy)) arrow(b.x, b.y, b.x + b.vx * 0.12, b.y + b.vy * 0.12, hexA(b.color, 0.6));
      }
      if (drag) {
        glowDot(drag.x, drag.y, drag.r, '#45c7e0', false);
        arrow(drag.x, drag.y, drag.cx, drag.cy, '#45c7e0');
        ctx.fillStyle = '#8a98ad'; ctx.font = '11px monospace';
        ctx.fillText('v=' + fmt(Math.hypot(drag.cx - drag.x, drag.cy - drag.y) * 2.2, 0) + '  m=' + drag.m, drag.x + 12, drag.y - 10);
      }
    };
    S.pointerDown = function (p) {
      const r = 14 + Math.random() * 14;
      drag = { x: p.x, y: p.y, cx: p.x, cy: p.y, r, m: Math.round(r / 4) };
    };
    S.pointerMove = function (p) { if (drag) { drag.cx = p.x; drag.cy = p.y; } };
    S.pointerUp = function () {
      if (!drag) return;
      const color = PALETTE[S.balls.length % PALETTE.length];
      S.balls.push({ x: drag.x, y: drag.y, vx: (drag.cx - drag.x) * 2.2, vy: (drag.cy - drag.y) * 2.2, r: drag.r, m: drag.m, color });
      drag = null;
    };
    function totals() {
      let px = 0, py = 0, ke = 0;
      for (const b of S.balls) { px += b.m * b.vx; py += b.m * b.vy; ke += 0.5 * b.m * (b.vx * b.vx + b.vy * b.vy); }
      return { p: Math.hypot(px, py), ke };
    }
    S.status = function () {
      const T = totals();
      return { state: S.playing ? '충돌 시뮬레이션' : (S.balls.length ? '준비' : '공을 발사하세요'), time: fmt(S.time, 1) + 's',
        extras: [{ k: '공', v: S.balls.length }, { k: '운동량', v: fmt(T.p / 1000, 1) + 'k' }, { k: 'KE', v: fmt(T.ke / 1e5, 1) }] };
    };
    S.panelHTML = `
      <div class="group"><div class="group-label">충돌 설정</div>
        <div class="field"><div class="field-row"><label>반발 계수 e</label><span class="val" id="c-e-v">1.00</span></div><input type="range" id="c-e" min="0" max="1" step="0.05" value="1"></div>
        <div class="field"><div class="field-row"><label>중력</label><span class="val" id="c-g-v">1.00 g</span></div><input type="range" id="c-g" min="0" max="3" step="0.05" value="1"></div>
        <div class="field"><div class="field-row"><label>시간 속도</label><span class="val" id="c-ts-v">1.0×</span></div><input type="range" id="c-ts" min="0.2" max="3" step="0.1" value="1"></div>
      </div>
      ${transportHTML()}
      <div class="group"><div class="group-label">계측 · Telemetry</div>
        <div class="telemetry">
          <div class="readout wide"><div class="rk">총 운동량 |Σp|</div><div class="rv accent" id="c-p">0.0</div></div>
          <div class="readout wide"><div class="rk">총 운동에너지 ΣKE</div><div class="rv" id="c-ke">0.0</div></div>
        </div>
      </div>
      <div class="note">${ICONS.info}<div><b>조작법:</b> 빈 공간을 <b>끌어 공을 발사</b>하세요(끄는 길이=속도, 공 크기=질량). <b>e=1</b>이면 완전탄성(에너지 보존), <b>e=0</b>이면 완전비탄성입니다. 중력 <b>1.00 g</b>는 지구 중력가속도이며, 중력을 0으로 두면 공끼리 충돌에서 운동량이 보존됩니다.</div></div>`;
    S.tickPanel = function () {
      const T = totals(); const pe = $('#c-p'), ke = $('#c-ke');
      if (pe) pe.textContent = fmt(T.p / 1000, 2) + 'k';
      if (ke) ke.textContent = fmt(T.ke / 1e5, 2);
    };
    S.bind = function (root) {
      const bs = (id, prop, lab) => { const s = $('#' + id, root), v = $('#' + id + '-v', root); s.addEventListener('input', () => { S[prop] = +s.value; v.textContent = lab ? lab(+s.value) : s.value; }); };
      bs('c-e', 'e', v => v.toFixed(2)); bs('c-g', 'gravity', v => v.toFixed(2) + ' g'); bs('c-ts', 'timeScale', v => v.toFixed(1) + '×');
    };
    return S;
  })();

  /* =======================================================================
     SIM 5 — 포물선 운동
     ======================================================================= */
  const Projectile = (function () {
    const S = new BaseSim();
    S.id = 'projectile'; S.v0 = 360; S.angle = 50; S.g = 600; S.drag = 0; S.keepTrails = true;
    S.shots = []; S.live = null;
    let aim = null; // dragging to aim
    const GROUND = () => H - 40;
    const origin = () => ({ x: 70, y: GROUND() });

    S.reset = function () { S.pause(); S.time = 0; S.shots = []; S.live = null; aim = null; };
    S.enter = function () { S.time = 0; };
    S.launch = function () {
      const o = origin();
      const rad = S.angle * D2R;
      S.live = { x: o.x, y: o.y, vx: S.v0 * Math.cos(rad), vy: -S.v0 * Math.sin(rad), trail: [], color: PALETTE[S.shots.length % PALETTE.length], maxH: 0, t: 0, range: 0 };
      S.play();
    };
    S.step = function (dt) {
      const h = 1 / 240; let tt = Math.min(dt, 1 / 20), gd = 0;
      const o = origin();
      while (tt > 0 && gd++ < 800) {
        const s = Math.min(h, tt); tt -= s;
        const b = S.live; if (!b) break;
        if (S.drag > 0) { const sp = Math.hypot(b.vx, b.vy); const k = S.drag * 0.0008; b.vx -= k * sp * b.vx * s; b.vy -= k * sp * b.vy * s; }
        b.vy += S.g * s; b.x += b.vx * s; b.y += b.vy * s; b.t += s;
        b.maxH = Math.max(b.maxH, o.y - b.y);
        if (b.y >= o.y && b.vy > 0) { b.y = o.y; b.range = b.x - o.x; b._landed = true; break; }
        if (b.x > W + 200) { b._landed = true; break; }
      }
      if (S.live) { S.live.trail.push(S.live.x, S.live.y); if (S.live.trail.length > 1200) S.live.trail.splice(0, 2); }
      if (S.live && S.live._landed) { if (S.keepTrails) S.shots.push(S.live); S.last = S.live; S.live = null; S.pause(); }
      S.time += dt;
    };
    S.draw = function () {
      drawGrid();
      const o = origin(), gy = GROUND();
      // ground
      ctx.fillStyle = 'rgba(74,222,128,0.06)'; ctx.fillRect(0, gy, W, H - gy);
      ctx.strokeStyle = 'rgba(74,222,128,0.4)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
      // launcher
      ctx.save();
      ctx.translate(o.x, o.y);
      const rad = S.angle * D2R;
      ctx.strokeStyle = '#57647d'; ctx.lineWidth = 8; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(Math.cos(rad) * 34, -Math.sin(rad) * 34); ctx.stroke();
      ctx.restore();
      glowDot(o.x, o.y, 8, '#45c7e0', true);

      // predicted trajectory (no drag, faint)
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1; ctx.setLineDash([4, 5]);
      ctx.beginPath();
      const vx0 = S.v0 * Math.cos(rad), vy0 = -S.v0 * Math.sin(rad);
      for (let tt = 0; tt < 12; tt += 0.04) {
        const x = o.x + vx0 * tt, y = o.y + vy0 * tt + 0.5 * S.g * tt * tt;
        if (y > o.y && tt > 0.1) break;
        if (tt === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke(); ctx.setLineDash([]); ctx.restore();

      // past shots
      for (const sh of S.shots) polyTrail(sh.trail, sh.color, 0.4);
      // live shot
      if (S.live) { polyTrail(S.live.trail, S.live.color, 0.7); glowDot(S.live.x, S.live.y, 7, S.live.color, false); }

      // aiming drag
      if (aim) {
        const dx = aim.x - o.x, dy = aim.y - o.y;
        const ang = Math.atan2(-dy, dx) * R2D;
        arrow(o.x, o.y, aim.x, aim.y, '#45c7e0');
        ctx.fillStyle = '#8a98ad'; ctx.font = '11px monospace';
        ctx.fillText(fmt(Math.abs(ang), 0) + '°  v=' + fmt(Math.hypot(dx, dy) * 1.6, 0), aim.x + 12, aim.y - 8);
      }
    };
    S.pointerDown = function (p) { const o = origin(); if (dist(p.x, p.y, o.x, o.y) < 240 || true) aim = { x: p.x, y: p.y }; };
    S.pointerMove = function (p) {
      if (!aim) return; aim.x = p.x; aim.y = p.y;
      const o = origin(), dx = p.x - o.x, dy = p.y - o.y;
      S.angle = clamp(Math.atan2(Math.max(1, -dy), Math.abs(dx)) * R2D, 1, 89);
      S.v0 = clamp(Math.hypot(dx, dy) * 1.6, 40, 700);
      syncSliders();
    };
    S.pointerUp = function () { if (aim) { aim = null; S.launch(); } };
    S.status = function () {
      const ref = S.live || S.last;
      const ex = [{ k: 'v₀', v: fmt(S.v0, 0) }, { k: 'θ', v: fmt(S.angle, 0) + '°' }];
      if (ref) ex.push({ k: '사거리', v: fmt(ref.range || (ref.x - origin().x), 0) });
      return { state: S.live ? '비행 중' : '발사대를 끌어 조준', time: fmt(S.time, 1) + 's', extras: ex };
    };
    S.panelHTML = `
      <div class="group"><div class="group-label">발사 조건</div>
        <div class="field"><div class="field-row"><label>초기 속도 v₀</label><span class="val" id="r-v0-v">360</span></div><input type="range" id="r-v0" min="40" max="700" step="10" value="360"></div>
        <div class="field"><div class="field-row"><label>발사각 θ</label><span class="val" id="r-ang-v">50°</span></div><input type="range" id="r-ang" min="1" max="89" step="1" value="50"></div>
      </div>
      <div class="group"><div class="group-label">환경</div>
        <div class="field"><div class="field-row"><label>중력 g</label><span class="val" id="r-g-v">600</span></div><input type="range" id="r-g" min="100" max="1500" step="20" value="600"></div>
        <div class="field"><div class="field-row"><label>공기 저항</label><span class="val" id="r-d-v">0.0</span></div><input type="range" id="r-d" min="0" max="3" step="0.1" value="0"></div>
        <div class="check-row"><label>이전 궤적 유지</label><div class="switch on" id="r-keep"><div class="knob"></div></div></div>
      </div>
      <div class="transport">
        <button class="btn primary" id="r-fire">${ICONS.play}<span class="lbl">발사</span></button>
        <button class="btn btn-pause">${ICONS.pause}일시정지</button>
        <button class="btn btn-reset">${ICONS.reset}초기화</button>
      </div>
      <div class="group"><div class="group-label">계측 · Telemetry</div>
        <div class="telemetry">
          <div class="readout"><div class="rk">사거리 R</div><div class="rv accent" id="r-R">–</div></div>
          <div class="readout"><div class="rk">최고 높이 H</div><div class="rv" id="r-H">–</div></div>
          <div class="readout"><div class="rk">체공 시간</div><div class="rv" id="r-T">–<span class="unit">s</span></div></div>
          <div class="readout"><div class="rk">예상 사거리</div><div class="rv" id="r-Rp">–</div></div>
        </div>
      </div>
      <div class="note">${ICONS.info}<div><b>조작법:</b> 발사대 근처를 <b>끌어 당겨</b> 각도·세기를 정하고 손을 떼면 발사됩니다. 점선은 공기저항 없는 <b>이론 궤적</b>입니다. 45°에서 사거리가 최대가 되는지 확인해 보세요.</div></div>`;
    function syncSliders() {
      const v0 = $('#r-v0'), v0v = $('#r-v0-v'), ang = $('#r-ang'), angv = $('#r-ang-v');
      if (v0) { v0.value = Math.round(S.v0); v0v.textContent = Math.round(S.v0); }
      if (ang) { ang.value = Math.round(S.angle); angv.textContent = Math.round(S.angle) + '°'; }
    }
    S.tickPanel = function () {
      const ref = S.live || S.last;
      const rad = S.angle * D2R;
      const Rp = S.v0 * S.v0 * Math.sin(2 * rad) / S.g;
      const Rpe = $('#r-Rp'); if (Rpe) Rpe.textContent = fmt(Rp, 0);
      const Re = $('#r-R'), He = $('#r-H'), Te = $('#r-T');
      if (ref) {
        if (Re) Re.textContent = fmt(ref.range || (ref.x - origin().x), 0);
        if (He) He.textContent = fmt(ref.maxH, 0);
        if (Te) Te.innerHTML = fmt(ref.t, 2) + '<span class="unit">s</span>';
      } else { if (Re) Re.textContent = '–'; if (He) He.textContent = '–'; if (Te) Te.innerHTML = '–<span class="unit">s</span>'; }
    };
    S.bind = function (root) {
      const bs = (id, prop, lab) => { const s = $('#' + id, root), v = $('#' + id + '-v', root); s.addEventListener('input', () => { S[prop] = +s.value; v.textContent = lab ? lab(+s.value) : s.value; }); };
      bs('r-v0', 'v0'); bs('r-ang', 'angle', v => v + '°'); bs('r-g', 'g'); bs('r-d', 'drag', v => v.toFixed(1));
      const keep = $('#r-keep', root);
      keep.addEventListener('click', () => { S.keepTrails = !S.keepTrails; keep.classList.toggle('on', S.keepTrails); if (!S.keepTrails) S.shots = []; });
      $('#r-fire', root).addEventListener('click', () => S.launch());
    };
    return S;
  })();

  /* =======================================================================
     ENGINE BOOTSTRAP
     ======================================================================= */
  const SIMS = { orbit: Orbit, pendulum: Pendulum, wave: Wave, collision: Collision, projectile: Projectile };
  current = Orbit;

  const panelsRoot = $('#panels');
  Object.values(SIMS).forEach(sim => {
    const div = document.createElement('div');
    div.className = 'panel' + (sim === current ? ' active' : '');
    div.dataset.sim = sim.id;
    div.innerHTML = sim.panelHTML;
    panelsRoot.appendChild(div);
    sim.bind(div);
    $('.btn-play', div) && $('.btn-play', div).addEventListener('click', () => sim.play());
    $('.btn-pause', div) && $('.btn-pause', div).addEventListener('click', () => sim.pause());
    $('.btn-reset', div) && $('.btn-reset', div).addEventListener('click', () => sim.reset());
  });

  /* 슬라이더 수치(.val) 클릭 → 직접 입력. 해당 슬라이더의 min~max 범위로 자동 제한 */
  panelsRoot.addEventListener('click', e => {
    const val = e.target.closest('.val');
    if (!val || !val.id || !val.id.endsWith('-v') || val.querySelector('input')) return;
    const slider = document.getElementById(val.id.slice(0, -2));
    if (!slider || slider.type !== 'range') return;
    const prev = val.textContent;
    const inp = document.createElement('input');
    inp.type = 'number'; inp.className = 'val-edit';
    inp.value = slider.value; inp.min = slider.min; inp.max = slider.max; inp.step = slider.step;
    val.classList.add('editing');
    val.textContent = ''; val.appendChild(inp);
    inp.focus(); inp.select();
    let done = false;
    const finish = (apply) => {
      if (done) return; done = true;
      val.classList.remove('editing');
      if (apply && inp.value !== '' && isFinite(+inp.value)) {
        slider.value = Math.min(+slider.max, Math.max(+slider.min, +inp.value));
        slider.dispatchEvent(new Event('input', { bubbles: true }));
        if (val.querySelector('input')) val.textContent = slider.value; // 포맷터 미적용 시 보정
      } else {
        val.textContent = prev;
      }
    };
    inp.addEventListener('blur', () => finish(true));
    inp.addEventListener('keydown', ev => {
      if (ev.key === 'Enter') { ev.preventDefault(); finish(true); }
      else if (ev.key === 'Escape') { ev.preventDefault(); finish(false); }
    });
  });

  function updateTransport() {
    const panel = $('.panel[data-sim="' + current.id + '"]');
    if (!panel) return;
    const pb = $('.btn-play', panel) || $('#r-fire', panel);
    if (!pb) return;
    pb.classList.toggle('is-playing', !!current.playing);
  }
  // make accessible to BaseSim closures
  window.__updateTransport = updateTransport;

  const HINTS = {
    orbit: '빈 공간을 <b>누른 채 끌어</b> 물체와 초기 속도를 만드세요',
    pendulum: '<b>질점을 끌어</b> 초기 각도를 정한 뒤 시작하세요',
    wave: '캔버스를 <b>끌어</b> 진폭·파장을 바꾸거나 슬라이더로 조절하세요',
    collision: '빈 공간을 <b>누른 채 끌어</b> 공을 발사하세요',
    projectile: '발사대를 <b>끌어 당겨</b> 각도와 세기를 정하세요'
  };
  const hintEl = $('#hint');
  let hintTimer = null;
  function showHint() {
    hintEl.innerHTML = HINTS[current.id] || '';
    hintEl.style.opacity = '1';
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => { hintEl.style.opacity = '0'; }, 4500);
  }

  const tabs = $('#tabs');
  function switchTo(id) {
    const sim = SIMS[id]; if (!sim || sim === current) { if (sim === current) closeSidebar(); return; }
    current.pause(); current = sim;
    $$('.tab', tabs).forEach(t => t.classList.toggle('active', t.dataset.sim === id));
    $$('.panel', panelsRoot).forEach(p => p.classList.toggle('active', p.dataset.sim === id));
    sim.enter && sim.enter();
    showHint(); updateTransport();
  }
  $$('.tab', tabs).forEach(t => t.addEventListener('click', () => switchTo(t.dataset.sim)));

  /* pointer */
  let down = false;
  canvas.addEventListener('pointerdown', e => { down = true; try { canvas.setPointerCapture(e.pointerId); } catch (_) { } current.pointerDown && current.pointerDown(pos(e)); hintEl.style.opacity = '0'; });
  canvas.addEventListener('pointermove', e => { if (down) current.pointerMove && current.pointerMove(pos(e)); });
  window.addEventListener('pointerup', e => { if (down) { down = false; current.pointerUp && current.pointerUp(pos(e)); } });

  /* status bar */
  const sb = { dot: $('#runDot'), state: $('#st-state'), time: $('#st-time'), ex: [$('#st-extra1'), $('#st-extra2'), $('#st-extra3')] };
  function updateStatus() {
    const st = current.status ? current.status() : { state: '', time: '', extras: [] };
    sb.state.textContent = st.state; sb.time.textContent = st.time;
    sb.dot.classList.toggle('running', !!current.playing);
    sb.ex.forEach((el, i) => { const d = st.extras[i]; el.innerHTML = d ? '<span class="k">' + d.k + '</span><span class="v">' + d.v + '</span>' : ''; });
  }

  /* mobile sidebar */
  const sidebar = $('#sidebar'), scrim = $('#scrim');
  function openSidebar() { sidebar.classList.add('open'); scrim.classList.add('show'); }
  function closeSidebar() { sidebar.classList.remove('open'); scrim.classList.remove('show'); }
  $('#panelToggle').addEventListener('click', openSidebar);
  $('#sidebarClose').addEventListener('click', closeSidebar);
  scrim.addEventListener('click', closeSidebar);

  /* loop */
  let last = performance.now();
  function loop(t) {
    const dt = Math.min((t - last) / 1000, 1 / 20); last = t;
    if (current.playing && current.step) current.step(dt);
    ctx.clearRect(0, 0, W, H);
    current.draw && current.draw();
    current.tickPanel && current.tickPanel();
    updateStatus();
    requestAnimationFrame(loop);
  }

  resize();
  current.enter && current.enter();
  showHint();
  requestAnimationFrame(loop);

})();

</script>
</body>
</html>
